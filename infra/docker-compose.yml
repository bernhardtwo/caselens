services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: caselens
      POSTGRES_PASSWORD: caselens
      POSTGRES_DB: caselens
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caselens -d caselens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
